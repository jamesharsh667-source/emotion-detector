<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        main {
            max-width: 760px;
            margin: 64px auto;
            padding: 32px;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 12px;
            font: inherit;
            border: 1px solid #b7c3d0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            margin-top: 16px;
            padding: 10px 18px;
            font: inherit;
            color: #ffffff;
            background: #2563eb;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <h1>Emotion Detector</h1>
        <textarea id="textToAnalyze">I am happy today</textarea>
        <button type="button" onclick="detectEmotion()">Analyze emotion</button>
        <p id="result"></p>
    </main>

    <script>
        async function detectEmotion() {
            const text = document.getElementById("textToAnalyze").value;
            const response = await fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`);
            document.getElementById("result").textContent = await response.text();
        }
    </script>
</body>
</html>
